<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - Administration</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: #f0f4f8; }
        .login-container { max-width: 450px; margin: 5rem auto; padding: 2rem; }
        .login-box {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,.1);
        }
        .login-title { color: #1a5276; text-align: center; margin-bottom: 0.5rem; font-size: 1.6rem; }
        .login-subtitle { text-align: center; color: #666; font-size: 0.95rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #333; }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-input:focus { outline: none; border-color: #2a9d8f; }
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: #2a9d8f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #1a7a6e; }
        .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.95rem; display: none; }
        .alert.show { display: block; }
        .alert-success { background: #e8f5e9; color: #2e7d32; }
        .alert-error   { background: #ffebee; color: #c62828; }
        .hint { font-size: 0.82rem; color: #999; margin-top: 0.3rem; }
        .links { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .links a { color: #2a9d8f; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Nouveau mot de passe</h1>
            <p class="login-subtitle">Choisissez un nouveau mot de passe pour votre compte admin.</p>

            <div class="alert alert-success" id="successMsg"></div>
            <div class="alert alert-error"   id="errorMsg"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="password" class="form-label">Nouveau mot de passe</label>
                    <input type="password" id="password" name="password" class="form-input" required autofocus
                           minlength="8" placeholder="Minimum 8 caractères">
                    <p class="hint">Au moins 8 caractères</p>
                </div>
                <div class="form-group">
                    <label for="confirm" class="form-label">Confirmer le mot de passe</label>
                    <input type="password" id="confirm" name="confirm" class="form-input" required
                           placeholder="Répétez le mot de passe">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Enregistrer le mot de passe</button>
            </form>

            <div class="links">
                <a href="login.html">← Retour à la connexion</a>
            </div>
        </div>
    </div>

    <script>
        // Récupérer le token depuis l'URL
        const params = new URLSearchParams(window.location.search);
        const token  = params.get('token');

        if (!token) {
            document.getElementById('errorMsg').textContent = 'Lien invalide ou expiré. Veuillez recommencer.';
            document.getElementById('errorMsg').classList.add('show');
            document.getElementById('resetForm').style.display = 'none';
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const password   = document.getElementById('password').value;
            const confirm    = document.getElementById('confirm').value;
            const submitBtn  = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMsg');
            const errorMsg   = document.getElementById('errorMsg');

            successMsg.classList.remove('show');
            errorMsg.classList.remove('show');

            if (password !== confirm) {
                errorMsg.textContent = 'Les mots de passe ne correspondent pas.';
                errorMsg.classList.add('show');
                return;
            }
            if (password.length < 8) {
                errorMsg.textContent = 'Le mot de passe doit contenir au moins 8 caractères.';
                errorMsg.classList.add('show');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Enregistrement...';

            try {
                const response = await fetch('../api/admin-reset-password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const result = await response.json();

                if (result.success) {
                    successMsg.textContent = 'Mot de passe mis à jour ! Redirection...';
                    successMsg.classList.add('show');
                    document.getElementById('resetForm').style.display = 'none';
                    setTimeout(() => { window.location.href = 'login.html'; }, 2500);
                } else {
                    errorMsg.textContent = result.message || 'Une erreur est survenue.';
                    errorMsg.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Enregistrer le mot de passe';
                }
            } catch (err) {
                errorMsg.textContent = 'Une erreur est survenue. Veuillez réessayer.';
                errorMsg.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enregistrer le mot de passe';
            }
        });
    </script>
</body>
</html>
