<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Troubles de la Succion</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 5rem auto;
            padding: 2rem;
        }
        
        .login-box {
            background-color: var(--color-white);
            padding: 3rem;
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-lg);
        }
        
        .login-title {
            color: var(--color-primary-dark);
            text-align: center;
            margin-bottom: 2rem;
            font-family: var(--font-heading);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-text);
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--color-border);
            border-radius: var(--radius);
            font-size: 1rem;
            font-family: var(--font-primary);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        
        .btn-login {
            width: 100%;
            padding: 1rem;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            background-color: var(--color-primary-dark);
        }
        
        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Administration</h1>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" class="form-input" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" id="password" name="password" class="form-input" required>
                </div>
                
                <button type="submit" class="btn-login">Se connecter</button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem; color: var(--color-text-light); font-size: 0.9rem;">
                <a href="../index.html">← Retour au site</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            try {
                const response = await fetch('../api/admin-login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    window.location.href = 'dashboard.php';
                } else {
                    errorMessage.textContent = result.message || 'Identifiants incorrects';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                console.error('Erreur:', error);
                errorMessage.textContent = 'Une erreur est survenue. Veuillez réessayer.';
                errorMessage.classList.add('show');
            }
        });
    </script>
</body>
</html>
